<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{common :: meta_header('書籍一覧',~{::link},~{::script})}">
    <title th:text="${title}+' | MTLibrary'"></title>
    <link rel="stylesheet" th:href="@{/css/book/index.css}" />
    <script type="text/javascript" th:src="@{/js/book/index.js}"></script>
</head>
<body>
    <div class="contents">
        <div th:replace="~{common :: main_sidebar}"></div>
        <div class="main_contents">
            <div th:replace="~{common :: header}"></div>
            <div class="inner_contents">
                <div class="page_title">書籍一覧</div>

                <!--右寄せの書籍登録画面への遷移ボタン-->
                <div style="text-align: right; margin-bottom: 10px; padding-right: 20px;">
                <form th:action="@{/book/add}" method="get">
                    <button type="submit" style="background-color: #94ec97; color: black; padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer;">
                        書籍登録
                    </button>
                </form>
            </div>

                <!--書籍一覧テーブル-->
                <div>
                    <table border="1" style="margin: 0 auto; border-collapse: collapse; width: 600px;">
                        <tr>
                            <th style="background-color: #f0f0f0; width: 400px;">書籍名</th>
                            <th style="background-color: #f0f0f0; width: 200px;">ISBN</th>
                        </tr>
                        <tr th:each="book : ${bookMstList}">
                            <td th:text="${book.title}"></td>
                            <td th:text="${book.isbn}"></td>
                        </tr>
                    </table>
                </div>

            </div>
        </div>
    </div>

    <div th:replace="~{common :: footer}"></div>
</body>
